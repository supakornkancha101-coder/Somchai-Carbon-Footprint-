<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Somchai's Daily Carbon Choices - Step Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDfGFQydex_o_6T_AbcfQI3mvBa8zcyYKk",
    authDomain: "somchai-carbon-footprint.firebaseapp.com",
    databaseURL: "https://somchai-carbon-footprint-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "somchai-carbon-footprint",
    storageBucket: "somchai-carbon-footprint.firebasestorage.app",
    messagingSenderId: "347331468738",
    appId: "1:347331468738:web:3f89a1ac02f82d11208a5b"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  window._fbPush = (data) => push(ref(db, "somchai_submissions"), data);
  window._fbListen = (cb) => onValue(ref(db, "somchai_submissions"), snap => {
    const raw = snap.val();
    cb(raw ? Object.entries(raw).map(([k,v]) => ({ _key: k, ...v })) : []);
  });
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#e0f7fa 0%,#fce4ec 50%,#f3e5f5 100%);min-height:100vh;color:#2d3436;overflow-x:hidden}
.container{max-width:600px;margin:0 auto;padding:20px 16px}
.step{display:none;animation:slideIn 0.4s ease-out forwards}
.step.active{display:block}
@keyframes slideIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}

header{text-align:center;margin-bottom:30px}
header h1{font-family:'Fredoka One',cursive;font-size:2rem;color:#2563eb;text-shadow:2px 2px 0 #bfdbfe}

.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 10px 25px rgba(0,0,0,.1);margin-bottom:20px}
.round-title{font-family:'Fredoka One',cursive;color:#1e40af;margin-bottom:15px;display:flex;align-items:center;gap:10px}
.round-num{background:#3b82f6;color:#fff;width:30px;height:30px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:0.9rem}

.choice-list{display:flex;flex-direction:column;gap:12px}
.choice-btn{border:2.5px solid #e5e7eb;border-radius:15px;padding:16px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;background:#fff;font-weight:700}
.choice-btn:hover{border-color:#3b82f6;background:#eff6ff}
.choice-btn.selected{border-color:#3b82f6;background:#3b82f6;color:#fff}
.carbon-tag{font-family:'Fredoka One',cursive;font-size:0.8rem;background:#f3f4f6;padding:4px 10px;border-radius:20px;color:#4b5563}
.selected .carbon-tag{background:rgba(255,255,255,0.2);color:#fff}

.footer-nav{display:flex;flex-direction:column;align-items:center;gap:15px;margin-top:20px}
.running-total{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#1e3a8a}
.btn-next{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;padding:15px 50px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;box-shadow:0 5px 15px rgba(59,130,246,0.4);display:none}
.btn-next.visible{display:block}

.group-input-box{text-align:center;padding:40px 0}
.group-input-box input{width:100%;padding:15px;border:3px solid #e5e7eb;border-radius:15px;font-size:1.1rem;font-family:'Nunito',sans-serif;font-weight:700;margin-top:15px;text-align:center}

/* Board Style */
#board{display:none}
.sub-grid{display:grid;grid-template-columns:1fr;gap:15px}
.sub-card{background:#fff;border-radius:15px;padding:15px;box-shadow:0 4px 10px rgba(0,0,0,0.05);display:flex;justify-content:space-between;align-items:center}
.sub-name{font-weight:800;color:#1e40af}
.sub-total{font-family:'Fredoka One',cursive;font-size:1.2rem;color:#f59e0b}
</style>
</head>
<body>

<div class="container" id="main-flow">
  <header>
    <h1>🌿 Somchai's Carbon Choices</h1>
  </header>

  <div class="step active" id="step-0">
    <div class="card group-input-box">
      <h2 style="font-family:'Fredoka One'">What is your Group Name?</h2>
      <input type="text" id="groupName" placeholder="Enter group name...">
      <button class="btn-next visible" style="margin: 20px auto" onclick="startQuiz()">Start Activity</button>
    </div>
  </div>

  <div id="quiz-container"></div>

  <div class="step" id="step-final">
    <div class="card" style="text-align:center">
      <h2 style="font-family:'Fredoka One'; color:#059669">Well Done!</h2>
      <p style="margin:10px 0">You have completed Somchai's day.</p>
      <div class="running-total" id="final-val" style="font-size:2.5rem; margin:20px 0">0</div>
      <button class="btn-next visible" style="margin: 0 auto" onclick="sendToFirebase()">Submit to Class Board</button>
    </div>
  </div>

  <div class="footer-nav" id="nav-bar" style="display:none">
    <div class="running-total">Total: <span id="current-total">0</span> gCO₂e</div>
    <button id="next-btn" class="btn-next" onclick="nextStep()">Next Round ➜</button>
  </div>
</div>

<div class="container" id="board">
  <header><h1>📊 Class Results</h1></header>
  <div class="sub-grid" id="subGrid"></div>
  <button class="btn-next visible" style="margin: 30px auto" onclick="location.reload()">Reset for New Group</button>
</div>

<script>
  let currentStep = 0;
  let totalCarbon = 0;
  let selectedValue = 0;
  let groupName = "";

  const rounds = [
    { title: "The Morning Rush", desc: "How does Somchai get to class?", options: [
      { text: "🚗 Private Car", val: 1200 },
      { text: "🚌 Public Bus", val: 400 },
      { text: "🚍 University EV Bus", val: 100 },
      { text: "🚶 Walk/Bicycle", val: 0 }
    ]},
    { title: "Lunch Time", desc: "What's for lunch?", options: [
      { text: "🥩 Beef Meal", val: 3000 },
      { text: "🍖 Pork Meal", val: 1600 },
      { text: "🍗 Chicken Meal", val: 900 },
      { text: "🥦 Plant-based", val: 400 }
    ]},
    { title: "Afternoon Study", desc: "Where to study?", options: [
      { text: "❄️ Private AC Room", val: 1250 },
      { text: "📚 Library (Shared AC)", val: 200 },
      { text: "💨 Electric Fan", val: 50 },
      { text: "🌳 Natural Breeze", val: 0 }
    ]}
  ];

  function startQuiz() {
    groupName = document.getElementById('groupName').value.trim();
    if(!groupName) return alert("Please enter group name!");
    buildQuiz();
    document.getElementById('step-0').classList.remove('active');
    document.getElementById('step-1').classList.add('active');
    document.getElementById('nav-bar').style.display = 'flex';
    currentStep = 1;
  }

  function buildQuiz() {
    const container = document.getElementById('quiz-container');
    rounds.forEach((r, i) => {
      const stepNum = i + 1;
      const html = `
        <div class="step" id="step-${stepNum}">
          <div class="card">
            <div class="round-title"><div class="round-num">${stepNum}</div><h3>${r.title}</h3></div>
            <p style="margin-bottom:15px; color:#6b7280; font-weight:600">${r.desc}</p>
            <div class="choice-list">
              ${r.options.map(opt => `
                <div class="choice-btn" onclick="pick(this, ${opt.val}, ${stepNum})">
                  <span>${opt.text}</span>
                  <span class="carbon-tag">${opt.val} g</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>`;
      container.innerHTML += html;
    });
  }

  function pick(el, val, step) {
    const parent = el.parentElement;
    parent.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedValue = val;
    document.getElementById('next-btn').classList.add('visible');
  }

  function nextStep() {
    totalCarbon += selectedValue;
    document.getElementById('current-total').textContent = totalCarbon.toLocaleString();
    document.getElementById(`step-${currentStep}`).classList.remove('active');
    
    currentStep++;
    selectedValue = 0;
    document.getElementById('next-btn').classList.remove('visible');

    if(currentStep > rounds.length) {
      document.getElementById('nav-bar').style.display = 'none';
      document.getElementById('step-final').classList.add('active');
      document.getElementById('final-val').textContent = totalCarbon.toLocaleString() + " gCO₂e";
    } else {
      document.getElementById(`step-${currentStep}`).classList.add('active');
    }
  }

  async function sendToFirebase() {
    const data = { groupName, total: totalCarbon, time: new Date().toLocaleTimeString() };
    await window._fbPush(data);
    showBoard();
  }

  function showBoard() {
    document.getElementById('main-flow').style.display = 'none';
    document.getElementById('board').style.display = 'block';
    window._fbListen(renderBoard);
  }

  function renderBoard(subs) {
    const grid = document.getElementById('subGrid');
    grid.innerHTML = '';
    subs.forEach(s => {
      grid.innerHTML += `
        <div class="sub-card">
          <span class="sub-name">👥 ${s.groupName}</span>
          <span class="sub-total">${s.total.toLocaleString()} g</span>
        </div>`;
    });
  }
</script>
</body>
</html>
